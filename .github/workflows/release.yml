name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch: {} # allow a manual release from the Actions tab

permissions:
  contents: write

jobs:
  # Only build a release when the version actually changed, so ordinary commits
  # to main (docs, CI tweaks, refactors) don't rebuild all four platforms.
  check-version:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need the parent commit to diff the version
      - id: check
        name: Detect version bump
        run: |
          cur=$(grep '"version"' package.json | head -1 | sed -E 's/.*"version": *"([^"]+)".*/\1/')
          prev=$(git show HEAD^:package.json 2>/dev/null | grep '"version"' | head -1 | sed -E 's/.*"version": *"([^"]+)".*/\1/')
          echo "current=$cur previous=$prev"
          if [ "$cur" != "$prev" ]; then echo "bumped=true" >> "$GITHUB_OUTPUT"; else echo "bumped=false" >> "$GITHUB_OUTPUT"; fi

  release:
    needs: check-version
    if: needs.check-version.outputs.bumped == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Cache the Rust build per matrix target (the two macOS jobs build
      # different targets, so key them apart to avoid clobbering each other).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # One release per version bump; re-pushes to the same version update the same release.
          tagName: v__VERSION__
          releaseName: "Reader v__VERSION__"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
